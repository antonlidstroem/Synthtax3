version: "3.9"

services:

  # ── SQL Server ────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: synthtax-db
    restart: unless-stopped
    environment:
      SA_PASSWORD:        "Synthtax_2024!"
      ACCEPT_EULA:        "Y"
      MSSQL_PID:          "Developer"
    ports:
      - "1433:1433"
    volumes:
      - synthtax_db:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "Synthtax_2024!",
             "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ASP.NET Core API ─────────────────────────────────────────────────
  api:
    image: synthtax-api:latest
    container_name: synthtax-api
    build:
      context: .
      dockerfile: Synthtax.API/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:              "Production"
      ASPNETCORE_URLS:                     "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=SynthtaxDb;
        User Id=sa;Password=Synthtax_2024!;
        TrustServerCertificate=True;
      JwtSettings__SecretKey:                 "BYTA-TILL-MINST-32-TECKEN-HEMLIG-NYCKEL!!"
      JwtSettings__Issuer:                 "Synthtax.API"
      JwtSettings__Audience:               "Synthtax.WPF"
      JwtSettings__AccessTokenExpiryMinutes: "60"
      JwtSettings__RefreshTokenExpiryDays:   "30"
      Seeding__AdminPassword:              "Admin@Synthtax1!"
      Seeding__DemoPassword:               "Demo@Synthtax1!"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  synthtax_db:
    driver: local
